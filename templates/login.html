<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — IWAF Security Dashboard</title>
    <meta name="description" content="Intelligent Web Application Firewall — secure admin login">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-page">

<main class="iwaf-login">
    <section class="iwaf-login-left">
        <div class="iwaf-login-leftInner">
            <h1 class="iwaf-login-title">
                Welcome to our<br>
                IWAF.<br>
                Login to get started.
            </h1>
            <p class="iwaf-login-sub">Enter your details to proceed further</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}{% for cat, msg in messages %}
                <div class="msg msg-{{ 'success' if cat=='success' else 'danger' }}" style="margin-bottom:16px">
                    <span><i class="bi bi-{{ 'check-circle-fill' if cat=='success' else 'exclamation-triangle-fill' }}" style="margin-right:6px"></i>{{ msg }}</span>
                    <button class="msg-close" onclick="this.parentElement.remove()"><i class="bi bi-x"></i></button>
                </div>
                {% endfor %}{% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('login') }}" id="login-form" class="iwaf-login-form">
                <label class="iwaf-login-label" for="username">Username</label>
                <input class="iwaf-login-input" type="text" id="username" name="username" placeholder="" required autofocus autocomplete="username">

                <label class="iwaf-login-label" for="password">Password</label>
                <div class="iwaf-login-pwWrap">
                    <input class="iwaf-login-input" type="password" id="password" name="password" placeholder="Enter your Password" required autocomplete="current-password">
                    <button type="button" id="toggle-pw" class="iwaf-login-pwToggle" aria-label="Toggle password visibility">
                        <i class="bi bi-eye" id="pw-icon"></i>
                    </button>
                </div>

                <button type="submit" class="iwaf-login-btn" id="sign-in-btn">Login</button>
            </form>
        </div>
    </section>

    <section class="iwaf-login-right" aria-hidden="true">
        <div class="iwaf-login-rightGlow"></div>
        <div class="iwaf-login-shieldWrap">

document.getElementById('toggle-pw').addEventListener('click', function() {
    const inp = document.getElementById('password');
    const icon = document.getElementById('pw-icon');
    if (inp.type === 'password') {
        inp.type = 'text';
        icon.className = 'bi bi-eye-slash';
    } else {
        inp.type = 'password';
        icon.className = 'bi bi-eye';
    }
});

document.getElementById('login-form').addEventListener('submit', function() {
    const btn = document.getElementById('sign-in-btn');
    btn.innerHTML = '<span style="display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .65s linear infinite;vertical-align:middle;margin-right:7px"></span>Signing in...';

});
</script>
